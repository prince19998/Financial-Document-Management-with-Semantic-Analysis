services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: financial_docs
      POSTGRES_USER: findoc
      POSTGRES_PASSWORD: findoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://findoc:findoc@db:5432/financial_docs
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
